<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Planner</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logos/favIconGreenInvi.png') }}">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Carga de CSS usando las reglas de entorno estático de Flask -->
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <link rel="stylesheet" href="../static/mytrips.css">
</head>
<body>

    <!-- Header heredable para todas las páginas -->
    <header class="d-flex justify-content-between align-items-center px-4 py-3 bg-white shadow-sm w-100 position-absolute top-0 z-3">
        
        <!-- Logo con link al index -->
        <a href="{{ url_for('index') }}" class="text-decoration-none fw-bold fs-5 text-dark d-flex align-items-center gap-2">
            <img src="../static/logos/logoSideInvi.png" alt="Logo" style="max-width: 170px;">
        </a>

        <div class="d-flex align-items-center gap-4">
            
            <!-- Link a My Trips (se pinta verde y se subraya si estamos en esa ruta) -->
            <a href="{{ url_for('mytrips') }}" 
               class="fw-medium {{ 'text-decoration-underline' if request.endpoint == 'mytrips' else 'text-decoration-none text-secondary' }}"
               {% if request.endpoint == 'mytrips' %}style="color: var(--brand-color, #006d5b);"{% endif %}>
               My Trips
            </a>

            <!-- Avatar -->
            <div class="rounded-circle d-flex align-items-center justify-content-center" style="width: 35px; height: 35px; background-color: #ddd;">
                <i class="fa-solid fa-user" style="color: #666;"></i>
            </div>
        </div>
    </header>

    <!-- Aquí se inyectará el contenido de las demás páginas -->
    {% block body %} 
    {% endblock %}

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
